# .github/workflows/daily-dinner.yml
# Každý den ve 14:00 SEČ (13:00 UTC) spustí generování návrhů

name: Daily Dinner Generator

on:
  schedule:
    # 13:00 UTC = 14:00 SEČ (15:00 SELČ v létě – uprav dle potřeby)
    - cron: '0 12 * * *'
  workflow_dispatch: # Možnost spustit ručně z GitHub UI

jobs:
  trigger-dinner:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily dinner cron
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/daily")
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "Cron failed with status $response"
            exit 1
          fi
